[project]
name = "nexus-schema"
version = "0.1.0"
description = "Canonical Nexus ingest types (Python binding of ingest.v1.schema.json)."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.5",
    "mypy>=1.10",
    "pytest>=8.2",
    "jsonschema>=4.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus_schema"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "SIM"]

[tool.mypy]
strict = true
mypy_path = "src"
packages = ["nexus_schema"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
