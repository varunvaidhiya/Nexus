<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nexus Capture — settings</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
      label { display: block; margin-top: 1rem; font-weight: 600; }
      input[type="text"], input[type="password"] { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
      .toggle { font-weight: 400; margin-top: 0.5rem; }
      button { margin-top: 1.5rem; padding: 0.5rem 1.25rem; }
      #status { margin-left: 0.75rem; color: green; }
    </style>
  </head>
  <body>
    <h1>Nexus Capture</h1>
    <p>
      Captures conversations on allowlisted AI sites and pushes them to your
      self-hosted Nexus. Create a device token in Nexus Settings → Devices.
    </p>

    <label for="backendUrl">Backend URL</label>
    <input type="text" id="backendUrl" placeholder="http://localhost:8000" />

    <label for="deviceToken">Device token</label>
    <input type="password" id="deviceToken" placeholder="nxd_..." />

    <label>Capture on</label>
    <label class="toggle"><input type="checkbox" id="site-chatgpt" checked /> chatgpt.com</label>
    <label class="toggle"><input type="checkbox" id="site-claude" checked /> claude.ai</label>

    <button id="save">Save</button><span id="status"></span>

    <script src="options.js"></script>
  </body>
</html>
