name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (lint · types · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NEXUS_TEST_DATABASE_URL: postgresql+psycopg://nexus:nexus@localhost:5432/nexus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy
      - name: Pytest
        run: pytest

  schema:
    name: Schema package (Python + TypeScript bindings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/schema/python/pyproject.toml
      - name: Install (python)
        working-directory: packages/schema/python
        run: pip install -e ".[dev]"
      - name: Ruff
        working-directory: packages/schema/python
        run: ruff check . && ruff format --check .
      - name: Mypy
        working-directory: packages/schema/python
        run: mypy
      - name: Pytest (fixtures vs JSON Schema + Pydantic)
        working-directory: packages/schema/python
        run: pytest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/schema/typescript/package-lock.json
      - name: Install (typescript)
        working-directory: packages/schema/typescript
        run: npm ci
      - name: Typecheck fixtures
        working-directory: packages/schema/typescript
        run: npm run typecheck

  web:
    name: Web (lint · types · format · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Prettier
        run: npm run format:check
      - name: Build
        run: npm run build
